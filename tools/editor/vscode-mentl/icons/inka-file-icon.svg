<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Obsidian background -->
  <rect width="32" height="32" rx="4" fill="#0D0B0E"/>
  <!-- Incan stepped cross / chakana in gold -->
  <g fill="#E69F00" transform="translate(16,16)">
    <!-- Center -->
    <rect x="-3" y="-3" width="6" height="6"/>
    <!-- Four cardinal steps -->
    <rect x="-3" y="-9" width="6" height="4"/>
    <rect x="-3" y="5" width="6" height="4"/>
    <rect x="-9" y="-3" width="4" height="6"/>
    <rect x="5" y="-3" width="4" height="6"/>
    <!-- Four diagonal steps -->
    <rect x="-9" y="-9" width="4" height="4"/>
    <rect x="5" y="-9" width="4" height="4"/>
    <rect x="-9" y="5" width="4" height="4"/>
    <rect x="5" y="5" width="4" height="4"/>
  </g>
</svg>
