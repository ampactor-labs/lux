name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -W warnings

      - name: Build
        run: cargo build --release

      - name: Golden-file tests
        run: cargo test --test examples -- --test-threads=1

      - name: WASM crucible
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          export PATH="$HOME/.wasmtime/bin:$PATH"
          ./target/release/lux wasm examples/wasm_counter.lux > /tmp/counter.wat
          wasmtime /tmp/counter.wat | grep -q "count = 3"
