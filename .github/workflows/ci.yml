name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bootstrap:
    name: Self-hosted bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wabt (wat2wasm, wasm-validate)
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Install wasmtime
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH

      - name: Preflight (static invariants)
        run: make -C bootstrap preflight

      - name: Stage 0/1 (artifact → build, validate)
        run: |
          make -C bootstrap stage0
          make -C bootstrap stage1

      - name: Smoke tests (pattern + counter)
        run: make -C bootstrap smoke

      - name: WAT drift gate
        run: bootstrap/tools/check_wat.sh || true  # monotonically-tightening; non-blocking while Phase 2 lands
